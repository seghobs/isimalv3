<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post Kontrol</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/yorum_form.css') }}">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                <div class="form-card">
                    <h2><i class="fas fa-comments me-2"></i>Yorum Kontrolleri</h2>
                    <form method="post" action="/yorum_analiz">
                        <div class="mb-3">
                            <label for="post_link" class="form-label">
                                <i class="fab fa-instagram me-2"></i>İnstagram Post Linki
                            </label>
                            <input type="text" id="post_link" name="post_link" class="form-control"
                                placeholder="https://www.instagram.com/p/..." required>
                        </div>
                        <div class="mb-3">
                            <label for="grup_uye" class="form-label">
                                <i class="fas fa-users me-2"></i>Grup Üye Listesi
                            </label>
                            <textarea id="grup_uye" name="grup_uye" class="form-control"
                                placeholder="Her satıra bir kullanıcı adı yazın" oninput="updateUserCount()"
                                required></textarea>
                            <span id="user_count">0 Adet kullanıcı eklendi.</span>
                        </div>
                        <div class="mb-4">
                            <label for="izinliler" class="form-label">
                                <i class="fas fa-user-check me-2"></i>İzin İsteyenler Listesi
                            </label>
                            <textarea id="izinliler" name="izinliler" class="form-control"
                                placeholder="Her satıra bir kullanıcı adı yazın"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-search me-2"></i>Kontrol Et
                        </button>
                    </form>
                    <button onclick="location.href='token_al'" class="btn btn-secondary w-100 mb-2">
                        <i class="fas fa-key me-2"></i>Token Al
                    </button>
                    <button onclick="location.href='admin'" class="btn btn-admin w-100">
                        <i class="fas fa-lock me-2"></i>Admin Panel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/yorum_form.js') }}"></script>
    <!-- Global Token Kontrol Scripti -->
    <div id="tokenWarningModal"
        style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div
            style="background: rgba(30, 30, 46, 0.95); border: 1px solid rgba(231, 76, 60, 0.4); border-radius: 16px; padding: 30px; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(231, 76, 60, 0.2);">
            <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #e74c3c; margin-bottom: 20px;"></i>
            <h2 style="color: #fff; margin-bottom: 15px; font-family: 'Poppins', sans-serif; font-size: 24px;">Uyarı:
                Tüm Hesaplar Çıkış Yapmış!</h2>
            <p
                style="color: rgba(255,255,255,0.8); margin-bottom: 25px; line-height: 1.6; font-family: 'Poppins', sans-serif; font-size: 14px;">
                Sistemde kayıtlı olan tüm Instagram tokenlarının süresi dolmuş veya çıkış yapılmış görünmüyor. Tüm
                işlemler durduruldu, botun yeniden çalışabilmesi için lütfen Admin Paneli'nden tokenları yenileyin!</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="document.getElementById('tokenWarningModal').style.display='none';"
                    style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif;">Kapat</button>
                <a href="/admin"
                    style="background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.4); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif;">Admin
                    Panele Git</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/yorum_form.js') }}"></script>
</body>

</html>
