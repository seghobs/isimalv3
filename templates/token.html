<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Al - Instagram Giriş</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/token.css') }}">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                <div class="login-card">
                    <h2>
                        <i class="fas fa-key me-2"></i>Token Al
                    </h2>
                    <div class="alert alert-info mb-4">
                        <i class="fas fa-info-circle me-2"></i>
                        Instagram hesabınıza giriş yaparak token oluşturabilirsiniz.
                    </div>
                    <div id="loadingMessage" class="alert alert-info mb-4" style="display: none;">
                        <i class="fas fa-spinner fa-spin me-2"></i>
                        Token alınıyor, lütfen bekleyin...
                    </div>
                    <div id="successMessage" class="alert alert-success mb-4" style="display: none;">
                        <i class="fas fa-check-circle me-2"></i>
                        <span id="successText"></span>
                    </div>
                    <div id="errorMessage" class="alert alert-danger mb-4" style="display: none;">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span id="errorText"></span>
                    </div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="kullanici_adi" class="form-label">
                                <i class="fas fa-user me-2"></i>Kullanıcı Adı
                            </label>
                            <input type="text" id="kullanici_adi" name="kullanici_adi" class="form-control"
                                placeholder="Instagram kullanıcı adınız" required>
                        </div>
                        <div class="mb-3">
                            <label for="sifre" class="form-label">
                                <i class="fas fa-lock me-2"></i>Şifre
                            </label>
                            <input type="password" id="sifre" name="sifre" class="form-control"
                                placeholder="Instagram şifreniz" required>
                        </div>

                        <hr class="my-4">
                        <div class="alert alert-warning py-2 px-3 mb-3">
                            <i class="fas fa-shield-alt me-2"></i>
                            <strong>Cihaz Kimliği</strong> — Bu değerleri bir kez belirleyin ve <u>her zaman aynı
                                değerleri kullanın</u>. Değiştirirseniz Instagram hesabı çıkış yapabilir.
                        </div>

                        <div class="mb-3">
                            <label for="device_id" class="form-label">
                                <i class="fas fa-mobile-alt me-2"></i>Device ID
                                <span class="text-muted small ms-1">(UUID formatı)</span>
                            </label>
                            <input type="text" id="device_id" name="device_id" class="form-control font-monospace"
                                placeholder="1893c7a3-c663-4933-84cc-58ccbf7f0412" required>
                        </div>

                        <div class="mb-3">
                            <label for="android_id" class="form-label">
                                <i class="fab fa-android me-2"></i>Android ID
                                <span class="text-muted small ms-1">(16 karakter)</span>
                            </label>
                            <input type="text" id="android_id" name="android_id" class="form-control font-monospace"
                                placeholder="3724108ca33e7977" maxlength="16" required>
                        </div>

                        <div class="mb-4">
                            <label for="user_agent" class="form-label">
                                <i class="fas fa-phone me-2"></i>User Agent
                                <span class="text-muted small ms-1">(telefon modeli)</span>
                            </label>
                            <select id="user_agent_select" class="form-select mb-2" onchange="setUserAgent(this.value)">
                                <option value="">— Listeden seçin veya elle yazın —</option>
                                <option
                                    value="Instagram 361.0.0.46.88 Android (28/9; 360dpi; 1080x1920; Asus; ASUS_I003DD; ASUS_I003DD; intel; tr_TR; 674674763)">
                                    ASUS I003DD (Android 9)</option>
                                <option
                                    value="Instagram 335.0.0.39.93 Android (28/9; 360dpi; 1080x1920; Samsung Galaxy J7 C; SM-J701F; SM-J701F; intel; tr_TR; 609190017)">
                                    Samsung Galaxy J7 C (Android 9)</option>
                                <option
                                    value="Instagram 336.0.0.35.90 Android (34/14; 450dpi; 1080x2301; samsung; SM-S236DL; a23xq; qcom; en_US; 612068901)">
                                    Samsung SM-S236DL (Android 14)</option>
                                <option
                                    value="Instagram 337.0.0.0.76 Android (34/14; 450dpi; 1080x2132; samsung; SM-A156M; a15x; mt6835; pt_BR; 612712250)">
                                    Samsung SM-A156M (Android 14)</option>
                                <option
                                    value="Instagram 333.0.0.42.91 Android (25/7.1.1; 240dpi; 540x960; samsung; SM-J250F; j2y18lte; qcom; es_ES; 604247835)">
                                    Samsung SM-J250F (Android 7)</option>
                            </select>
                            <input type="text" id="user_agent" name="user_agent" class="form-control font-monospace"
                                placeholder="Instagram 361.0.0.46.88 Android (...)" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3" id="submitBtn">
                            <i class="fas fa-sign-in-alt me-2"></i>Giriş Yap ve Token Al
                        </button>
                    </form>

                    <script>
                        function setUserAgent(val) {
                            if (val) document.getElementById('user_agent').value = val;
                        }
                    </script>
                    <a href="/" class="btn-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Ana Sayfaya Dön
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/token.js') }}"></script>
</body>

</html>
