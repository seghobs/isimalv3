<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksikler</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/yorum_result.css') }}">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
                <div class="result-card">
                    <div class="text-center mb-4">
                        <h1 class="mb-3">
                            <i class="fas fa-user-minus me-2"></i>Eksikler
                        </h1>
                        <span id="elemanSayisi" class="d-block mb-3"></span>
                        
                        <!-- Arama Girişi -->
                        <div class="search-container mb-3">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="searchInput" placeholder="Kullanıcı adı ara..." 
                                   class="search-input" onkeyup="filterList()">
                        </div>
                        
                        <button class="btn btn-primary" onclick="kopyalaListeyi()">
                            <i class="fas fa-copy me-2"></i>Listeyi Kopyala
                        </button>
                    </div>
                    
                    <div class="mt-4">
                        <ul class="list-group list-group-flush" id="eksiklerListesi">
                            {% for eksik in eksikler %}
                            <li class="list-group-item">
                                <i class="fas fa-user me-2"></i><strong>{{ eksik }}</strong>
                            </li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bildirim -->
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notification-message"></span>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/yorum_result.js') }}"></script>
</body>

</html>
